# See https://github.com/peteonrails/voxtype/blob/main/docs/CONFIGURATION.md
# for details.

state_file = "auto"

[audio]
device = "default"
max_duration_secs = 60
sample_rate = 16000

[hotkey]
enabled = false

[osd]
enabled = false

[output]
mode = "type"
pre_output_command = "hyprctl dispatch 'hl.dsp.submap(\"voxtype_suppress\")'"
post_output_command = "hyprctl dispatch 'hl.dsp.submap(\"reset\")'"
auto_submit = true

[output.notification]
on_transcription = false

[whisper]
model = "large-v3-turbo"
