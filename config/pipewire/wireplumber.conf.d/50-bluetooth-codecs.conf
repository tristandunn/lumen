# Bluetooth audio tuning primarily for the Bose QC Ultra headphones.
#
# The goal is to stay on high-quality A2DP instead of the telephone-quality
# HSP/HFP, in addition to not disconnecting the headphones when audio stops.

monitor.bluez.properties = {
  bluez5.enable-sbc-xq = true
  bluez5.enable-msbc = true
  bluez5.codecs = [ sbc_xq sbc ]
}

wireplumber.settings = {
  bluetooth.autoswitch-to-headset-profile = false
}

monitor.bluez.rules = [
  {
    matches = [
      { node.name = "~bluez_output.*" }
    ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
      }
    }
  }
]
