context.properties = {
  # Default to 48kHz (CS2 native, common DAW rate), but allow switching
  # so 44.1k and 96k projects don't get resampled.
  default.clock.rate = 48000
  default.clock.allowed-rates = [ 44100 48000 96000 ]

  # 512 @ 48kHz = ~10.7ms — comfortable default for games and mixing.
  # DAWs can negotiate down to 64 (~1.3ms) for tracking.
  default.clock.quantum = 512
  default.clock.min-quantum = 64
  default.clock.max-quantum = 2048
}
