# Configuration for Apple Magic Keyboard
# fnmode: 0 = disabled, 1 = fkeyslast (media keys default, fn for F-keys),
#         2 = fkeysfirst (F-keys default, fn for media)
options hid_apple fnmode=2

# Swap Option and Command keys (useful for macOS muscle memory)
# 0 = disabled, 1 = enabled
options hid_apple swap_opt_cmd=1

# Swap Fn and left Control keys
# 0 = disabled, 1 = enabled
options hid_apple swap_fn_leftctrl=0

# ISO layout handling
# 0 = disabled, 1 = enabled
options hid_apple iso_layout=0
