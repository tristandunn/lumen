[General]
# Limit the discoverable window to 2 minutes.
DiscoverableTimeout=120
# Keep the adapter ready for faster connections.
FastConnectable=true
# Enable Secure Simple Pairing with ECDH key exchange.
SecureConnections=true

[GATT]
# Cache device attributes for faster reconnection.
Cache=always
# Allow larger packets for better throughput.
ExchangeMTU=517
# Enforce 128-bit encryption.
KeySize=16

[Policy]
# Enable Bluetooth on boot.
AutoEnable=true
# Set the number of reconnection attempts.
ReconnectAttempts=7
# Set exponential backoff intervals in seconds.
ReconnectIntervals=1,2,4,8,16,32,64
